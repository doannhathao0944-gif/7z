<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7z•Zelrish | ADMIN PANEL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0f;color:#00ff88;font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.015) 2px,rgba(0,255,136,0.015) 4px);pointer-events:none;z-index:0;}

  /* LOGIN */
  #login-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:9999;}
  #login-box{background:#0d0d1a;border:1px solid #ff4400;border-radius:12px;padding:32px 28px;width:320px;box-shadow:0 0 30px rgba(255,68,0,0.2);}
  #login-box h2{font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:3px;color:#ff4400;text-align:center;margin-bottom:20px;}
  #login-box input{width:100%;background:#060610;border:1px solid #ff440055;border-radius:6px;padding:10px 14px;color:#ff8866;font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;margin-bottom:12px;}
  #login-box input:focus{border-color:#ff4400;box-shadow:0 0 8px rgba(255,68,0,0.3);}
  #login-box button{width:100%;background:#ff440020;border:1px solid #ff4400;border-radius:6px;padding:11px;color:#ff4400;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:2px;cursor:pointer;}
  #login-box button:hover{background:#ff440040;}
  #login-err{color:#ff4455;font-size:11px;text-align:center;margin-top:10px;display:none;}

  /* APP LAYOUT */
  #app{display:none;height:100vh;flex-direction:row;}
  #sidebar{width:230px;background:#0a0a14;border-right:1px solid #ff440022;display:flex;flex-direction:column;flex-shrink:0;}
  .sidebar-header{padding:18px 16px;border-bottom:1px solid #ff440022;}
  .sidebar-header h1{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:#ff4400;}
  .sidebar-header .sub{font-size:10px;color:#ff440077;margin-top:4px;letter-spacing:1px;}
  .nav-item{padding:13px 20px;cursor:pointer;font-size:12px;letter-spacing:1px;color:#cc4400;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:10px;}
  .nav-item:hover{color:#ff8866;background:#ff440008;border-left-color:#ff440044;}
  .nav-item.active{color:#ff6633;background:#ff440015;border-left-color:#ff4400;}
  .badge{background:#ff4400;color:#0a0a0f;font-size:9px;padding:2px 6px;border-radius:10px;font-family:'Orbitron',sans-serif;min-width:18px;text-align:center;}

  #content{flex:1;overflow-y:auto;padding:24px;background:#0a0a0f;}
  .page-title{font-family:'Orbitron',sans-serif;font-size:15px;letter-spacing:3px;color:#ff6633;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #ff440022;text-transform:uppercase;}

  /* CARDS */
  .card{background:#0d0d1a;border:1px solid #ff440033;border-radius:10px;padding:14px 18px;margin-bottom:12px;}
  .req-card{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .req-name{font-family:'Orbitron',sans-serif;font-size:12px;color:#ff8866;}
  .req-time{font-size:10px;color:#ff440066;}
  
  /* TABLES FOR INFO */
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px;}
  th{text-align:left;color:#ff440099;padding:10px;border-bottom:1px solid #ff440022;text-transform:uppercase;font-size:10px;}
  td{padding:10px;color:#ff8866;border-bottom:1px solid #ff440011;}

  .btn-accept{background:#00ff8820;border:1px solid #00ff88;padding:7px 14px;color:#00ff88;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:10px;border-radius:6px;}
  .btn-reject{background:#ff440020;border:1px solid #ff4400;padding:7px 14px;color:#ff4400;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:10px;border-radius:6px;}
  
  .empty-hint{color:#ff440044;font-size:12px;font-style:italic;}
  .tab-content{display:none;}
  .tab-content.active{display:block;}
  .activity-item{border-left:2px solid #ff440055;padding-left:15px;margin-bottom:15px;position:relative;}
  .activity-item::before{content:'';position:absolute;left:-5px;top:0;width:8px;height:8px;background:#ff4400;border-radius:50%;}
</style>
</head>
<body>

<div id="login-overlay">
  <div id="login-box">
    <h2>⚡ ADMIN ACCESS ⚡</h2>
    <input type="password" id="pw-input" placeholder="Mật khẩu admin...">
    <button onclick="doLogin()">[ ĐĂNG NHẬP ]</button>
    <div id="login-err">⚠ Sai mật khẩu!</div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <h1>7z•ZELRISH</h1>
      <div class="sub">ADMIN PANEL</div>
    </div>
    <div class="nav-item active" onclick="switchTab('approve',this)">
      ✅ Phê Duyệt <span class="badge" id="badge-count">0</span>
    </div>
    <div class="nav-item" onclick="switchTab('activity',this)">
      🕒 Hoạt Động
    </div>
    <div class="nav-item" onclick="switchTab('userinfo',this)">
      📄 Thông Tin User
    </div>
    <div class="nav-item" onclick="switchTab('tourney',this)">
      ⚔ Giải Đấu
    </div>
    <div class="nav-item" onclick="switchTab('notifs',this)">
      📢 Thông Báo
    </div>
    <div style="flex:1"></div>
  </div>

  <div id="content">
    <!-- APPROVE -->
    <div id="tab-approve" class="tab-content active">
      <div class="page-title">✅ Phê Duyệt Thành Viên</div>
      <div id="req-list"></div>
    </div>

    <!-- ACTIVITY -->
    <div id="tab-activity" class="tab-content">
      <div class="page-title">🕒 Nhật Ký Hoạt Động</div>
      <div id="activity-list"></div>
    </div>

    <!-- USER INFO -->
    <div id="tab-userinfo" class="tab-content">
      <div class="page-title">📄 Chi Tiết Thành Viên</div>
      <div class="card" style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Web Nick</th>
              <th>Game Nick</th>
              <th>UID</th>
              <th>Vị Trí</th>
              <th>Chế Độ</th>
              <th>Súng</th>
            </tr>
          </thead>
          <tbody id="info-table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- TOURNAMENT & OTHERS (Giữ nguyên logic cũ nhưng gọn lại) -->
    <div id="tab-tourney" class="tab-content">
      <div class="page-title">⚔ Quản Lý Giải Đấu</div>
      <div id="admin-tourney-list"></div>
    </div>

    <div id="tab-notifs" class="tab-content">
      <div class="page-title">📢 Thông Báo</div>
      <textarea id="notif-input" style="width:100%;height:100px;background:#060610;color:#00ff88;border:1px solid #ff440044;padding:10px;"></textarea>
      <button onclick="sendNotif()" style="margin-top:10px;padding:10px;background:#ff440020;color:#ff4400;border:1px solid #ff4400;width:100%;">GỬI</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDrtNjL4AxoQMvGlOnArIx1iPfqpMgW-qA",
  authDomain: "zelrish-clan.firebaseapp.com",
  databaseURL: "https://zelrish-clan-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "zelrish-clan",
  storageBucket: "zelrish-clan.firebasestorage.app",
  messagingSenderId: "69492644163",
  appId: "1:69492644163:web:1c185db6c682255ef937f6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ADMIN_PASS = "123456";

window.doLogin = function(){
  if(document.getElementById('pw-input').value === ADMIN_PASS){
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('app').style.display='flex';
    initAdmin();
  }
}

function initAdmin(){
  // Listen Requests
  onValue(ref(db,'requests'), (snap)=>{
    const data = snap.val();
    const el = document.getElementById('req-list');
    if(!data) { el.innerHTML='<div class="empty-hint">Trống...</div>'; return; }
    const pending = Object.entries(data).filter(([,v])=>v.status==='pending');
    document.getElementById('badge-count').textContent = pending.length;
    el.innerHTML = pending.map(([uid,u])=>`
      <div class="card req-card">
        <div><div class="req-name">${u.username}</div><div class="req-time">${new Date(u.timestamp).toLocaleString()}</div></div>
        <div>
          <button class="btn-accept" onclick="decide('${uid}','approved','${u.username}')">Duyệt</button>
          <button class="btn-reject" onclick="decide('${uid}','rejected','${u.username}')">Loại</button>
        </div>
      </div>`).join('');
  });

  // Listen Activities
  onValue(ref(db,'activities'), (snap)=>{
    const data = snap.val();
    const el = document.getElementById('activity-list');
    if(!data) return;
    el.innerHTML = Object.values(data).reverse().map(a=>`
      <div class="activity-item">
        <div style="font-size:12px; color:#ff8866">${a.content}</div>
        <div style="font-size:9px; color:#ff440055">${new Date(a.timestamp).toLocaleString()}</div>
      </div>`).join('');
  });

  // Listen User Profiles
  onValue(ref(db,'profiles'), (snap)=>{
    const data = snap.val();
    const el = document.getElementById('info-table-body');
    if(!data) return;
    el.innerHTML = Object.values(data).map(p=>`
      <tr>
        <td>${p.webNick}</td>
        <td>${p.gameNick}</td>
        <td>${p.gameUid}</td>
        <td>${p.role}</td>
        <td>${p.mode}</td>
        <td>${p.favGun}</td>
      </tr>`).join('');
  });
}

window.decide = function(uid, status, name){
  update(ref(db,'requests/'+uid), {status});
  push(ref(db,'activities'), {
    content: `Admin đã ${status==='approved'?'CHẤP NHẬN':'TỪ CHỐI'} thành viên: ${name}`,
    timestamp: Date.now()
  });
}

window.sendNotif = function(){
  const text = document.getElementById('notif-input').value;
  push(ref(db,'notifications'), {text, timestamp: Date.now()});
  push(ref(db,'activities'), { content: `Admin gửi thông báo: ${text.substring(0,20)}...`, timestamp: Date.now() });
}

window.switchTab = function(tab, el){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(el) el.classList.add('active');
}
</script>
</body>
</html>
